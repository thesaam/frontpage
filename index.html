<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <title>Zuri x I4G</title>
</head>
<body>
  <div class="p-0">
    <div id="container">
      <div class="left p-1">
        <div class="logo">
          <img src="./img/Group 10.png" alt="logo">
        </div>
        <div class="center">
          <div class="join">
            <img src="./img/Join Now!.png" alt="Join Now">
            <p>Tomorrow’s Tech Leaders start here.</p>
          </div>
          <div class="image">
            <img src="./img/Group 4.png" alt="image missing">
          </div>
        </div>
      </div>
      <div class="right p-2">
        <header>
          <h2>Register</h2>
        </header>
        <div class="line"></div>
        <form>
          <div class="form-flex">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input type="text" name="First Name">
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input type="text" name="Last Name">
            </div>
          </div>  
          <div class="form-flex">
            <div class="form-group">
              <label for="middleName">Middle Name</label>
              <input type="text" name="Middle Name">
            </div>
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" name="username">
            </div>
          </div>
          <div class="form-flex">
            <div class="form-group">
              <label for="gender">Gender</label>
              <input type="text" name="gender">
            </div>
            <div class="form-group">
              <label for="age">Age</label>
              <input type="number" name="age">
            </div>
          </div>
          <div class="form-flex">
            <div class="form-group">
              <label for="Track">Track</label>
              <select name="Track" id="Track">
                <option value="Front">Frontend</option>
                <option value="Back">Backend</option>
                <option value="Mobile">Mobile</option>
              </select>
            </div>
            <div class="form-group">
              <label for="experience">Experience Level</label>
              <input type="text">
            </div>
          </div>
          <div class="form-flex">
            <div class="form-group">
              <label for="employment">Employment Status</label>
              <input type="text">
            </div>
            <div class="form-group">
              <label for="education">Education</label>
              <input type="text">
            </div>
          </div>
  
          <div class="noflex">
            <label for="email">Email</label>
            <input type="email" name="email">
          </div>
  
          <div class="form-flex">
            <div class="form-group">
              <label for="pwd">Password</label>
              <input type="password" name="pwd">
            </div>
            <div class="form-group">
              <label for="pwd">Confirm Password</label>
              <input type="password" name="pwd">
            </div>
          </div>
  
          <div class="noflex">
            <label for="info">How did you hear about us?</label>
            <input type="text">
          </div>
        </form>
        <div class="text">
          <p class="sign">Already have an account ?</p>
          <button>Sign In</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
